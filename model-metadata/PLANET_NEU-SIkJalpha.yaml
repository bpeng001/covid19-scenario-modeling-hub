methods: "Metapopulation SIkJalpha model, built and calibrated with the help of Claude with strict human supervision."
data_inputs: "Weekly incident covid-19 hospitalizations and vaccinations"
methods_long: "The projections are generated by a simplified version of SIkJalpha with three groups: 65+, <64 LR, and >64 HR. The calibration is performed as in the original paper considering a single variant -- estimate transmission rates and contact matrix while sampling rest of the hyperparameters from a reasonable range. A scaling factor time series is extracted as a function of week of the year to capture seasonality and is used for future projection."
